<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayraffe Complex | Citizen Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global.js"></script>
    <style>
        :root {
            --steam-bg: #38413a;
            --steam-panel: #4b564d;
            --steam-border-light: #5d6a60;
            --steam-border-dark: #2a322c;
            --steam-input: #2a322c;
            --steam-text: #d1d1d1;
            --steam-yellow: #c1c6ad;
        }

        body { 
            background-color: var(--steam-bg); 
            color: var(--steam-text);
            font-family: "Tahoma", "Verdana", sans-serif; 
            font-size: 11px;
            margin: 0;
            padding: 0;
        }

        /* 2004 Window Bevels */
        .steam-window {
            background: var(--steam-panel);
            border: 1px solid var(--steam-border-dark);
            border-top: 1px solid var(--steam-border-light);
            border-left: 1px solid var(--steam-border-light);
            padding: 2px;
        }

        .steam-inset {
            background: var(--steam-input);
            border: 1px solid var(--steam-border-dark);
            border-right: 1px solid var(--steam-border-light);
            border-bottom: 1px solid var(--steam-border-light);
        }

        /* Standard Buttons */
        .steam-btn {
            background: linear-gradient(to bottom, #758276 0%, #4b564d 100%);
            border: 1px solid #1a201b;
            border-top: 1px solid #5d6a60;
            color: white;
            padding: 4px 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
        }

        .steam-btn:active {
            background: #323933;
            border: 1px solid #5d6a60;
            border-top: 1px solid #1a201b;
        }

        .steam-input {
            background: var(--steam-input);
            border: 1px solid var(--steam-border-dark);
            color: white;
            padding: 4px 8px;
            outline: none;
            font-family: monospace;
        }

        .result-entry {
            background: var(--steam-panel);
            border-bottom: 1px solid var(--steam-border-dark);
            padding: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .result-entry:hover {
            background-color: #5d6a60;
        }

        .result-entry:nth-child(even) {
            background-color: rgba(0,0,0,0.05);
        }

        .status-label {
            color: var(--steam-yellow);
            font-size: 9px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4">

    <nav class="flex justify-between items-center mb-4 pb-2 border-b border-white/10">
        <a href="../homepage" class="font-bold text-white tracking-tight text-lg">
            JAYRAFFE COMPLEX <span class="text-[9px] opacity-50 font-normal ml-2">SEARCH_PROTO v2.1</span>
        </a>
    </nav>

    <main class="max-w-4xl mx-auto">
        <header class="mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase mb-1">Citizen Search</h1>
            <p class="text-yellow-600 font-bold text-[10px] uppercase">Querying Central Mainframe Directory</p>
        </header>

        <div class="steam-window p-4 mb-6">
            <div class="flex flex-col sm:flex-row gap-3 items-end">
                <div class="flex-grow w-full">
                    <label class="block text-[9px] uppercase font-bold text-white/50 mb-1">Input Alias or Keyword</label>
                    <input type="text" id="citizen-query" 
                           placeholder="SEARCHING FOR..." 
                           class="steam-input w-full uppercase">
                </div>
                <button onclick="searchCitizens()" class="steam-btn h-[28px] whitespace-nowrap">
                    Execute Query
                </button>
            </div>
        </div>

        <div class="steam-window min-h-[300px]">
            <div class="bg-[#323933] p-1 px-2 border-b border-black/40 text-[9px] font-bold text-white/60">
                DIRECTORY MATCHES
            </div>
            <div id="search-results" class="steam-inset min-h-[280px]">
                <div class="flex flex-col items-center justify-center h-[280px] opacity-30 italic">
                    <p>Enter criteria to begin uplink...</p>
                </div>
            </div>
        </div>
        
    </main>

    <script>
        async function searchCitizens() {
            const query = document.getElementById('citizen-query').value.trim();
            const resultsContainer = document.getElementById('search-results');

            if (query.length < 2) {
                resultsContainer.innerHTML = `<div class="p-10 text-center text-red-400">Error: Input too short.</div>`;
                return;
            }

            resultsContainer.innerHTML = `<div class="p-10 text-center animate-pulse text-yellow-600 font-bold uppercase">Syncing with directory...</div>`;

            const { data: users, error } = await window.supabaseClient
                .from('profiles')
                .select('id, display_name, avatar_url, bio')
                .ilike('display_name', `%${query}%`)
                .limit(12);

            if (error) {
                resultsContainer.innerHTML = `<div class="p-10 text-center text-red-500">ERROR: ${error.message}</div>`;
                return;
            }

            if (users.length === 0) {
                resultsContainer.innerHTML = `<div class="p-10 text-center opacity-50 italic">No citizens found matching that signature.</div>`;
                return;
            }

            resultsContainer.innerHTML = users.map(user => `
                <div onclick="window.location.href='../profile/?id=${user.id}'" class="result-entry">
                    <div class="w-10 h-10 steam-inset overflow-hidden flex-shrink-0">
                        ${user.avatar_url ? `<img src="${user.avatar_url}" class="w-full h-full object-cover">` : `<div class="flex items-center justify-center h-full text-lg opacity-20">👤</div>`}
                    </div>
                    <div class="flex-grow min-w-0">
                        <div class="font-bold text-white uppercase leading-none">${user.display_name}</div>
                        <div class="status-label mt-1">${user.bio ? user.bio : 'Offline / No Status'}</div>
                    </div>
                    <div class="text-[9px] opacity-40 font-mono">
                        VIEW_DATA
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('citizen-query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchCitizens();
        });
    </script>
</body>
</html>
