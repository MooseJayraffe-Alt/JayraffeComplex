<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayraffe Complex | Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../global.js"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="glass-card p-10 rounded-3xl w-full max-w-md text-center">
        <h1 class="text-2xl font-black mb-6">SIGN-UP / LOG-IN</h1>
        
        <div class="space-y-4">
            <input type="text" id="username-input" placeholder="USERNAME" class="hidden w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-cyan-500">
            
            <input type="email" id="email-input" placeholder="EMAIL" class="w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-cyan-500">
            
            <input type="password" id="password-input" placeholder="PASSWORD" class="w-full p-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-cyan-500">
            
            <button id="auth-submit" onclick="handleAuth()" class="w-full py-3 bg-cyan-600 rounded-xl font-bold uppercase tracking-widest hover:bg-cyan-500">Login</button>
            
            <div class="flex justify-center gap-4 mt-4">
                <button onclick="setAuthMode('login')" class="text-xs text-cyan-400">LOGIN</button>
                <button onclick="setAuthMode('signup')" class="text-xs text-slate-500">SIGNUP</button>
            </div>
        </div>
    </div>

    <script>
        console.log("Auth script initialized.");

        let mode = 'login';

        function setAuthMode(newMode) {
            mode = newMode;
            const uInput = document.getElementById('username-input');
            const submitBtn = document.getElementById('auth-submit');
            
            if (mode === 'signup') {
                uInput.classList.remove('hidden');
                submitBtn.innerText = "Create Account";
            } else {
                uInput.classList.add('hidden');
                submitBtn.innerText = "Login";
            }
        }

                            async function handleAuth() {
    // Look for the global supabase client
    const client = window.supabaseClient;

    if (!client) {
        alert("System Error: Supabase connection not found. Check global.js");
        return;
    }

    const email = document.getElementById('email-input').value;
    const password = document.getElementById('password-input').value;
    const username = document.getElementById('username-input').value;

    if (mode === 'signup') {
        const { error } = await client.auth.signUp({
            email, 
            password, 
            options: { data: { display_name: username } }
        });
        if (error) alert(error.message);
        else alert("Account Created! You can now login.");
    } else {
        const { error } = await client.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else window.location.href = "../";
    }
}

    document.getElementById('auth-submit').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAuth();
        });
    </script>
    
</body>
</html>
