<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayraffe Complex | Loading...</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global.js"></script>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>

    <style>
        :root {
            --steam-bg: #38413a;
            --steam-panel: #4b564d;
            --steam-border-light: #5d6a60;
            --steam-border-dark: #2a322c;
            --steam-input: #2a322c;
            --steam-text: #d1d1d1;
            --steam-yellow: #c1c6ad;
        }

        body { 
            background-color: var(--steam-bg); 
            font-family: "Tahoma", "Verdana", sans-serif; 
            color: var(--steam-text);
            font-size: 11px;
        }

        /* HARD BORDERS (The 2004 Signature) */
        .steam-window {
            background: var(--steam-panel);
            border: 1px solid var(--steam-border-dark);
            border-top: 1px solid var(--steam-border-light);
            border-left: 1px solid var(--steam-border-light);
            padding: 2px;
        }

        .steam-inset {
            background: var(--steam-input);
            border: 1px solid var(--steam-border-dark);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* 2004 BUTTONS */
        .steam-btn {
            background: linear-gradient(to bottom, #758276 0%, #4b564d 100%);
            border: 1px solid #1a201b;
            border-top: 1px solid #5d6a60;
            color: white;
            padding: 4px 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
        }

        .steam-btn:active {
            background: #323933;
            border: 1px solid #5d6a60;
            border-top: 1px solid #1a201b;
        }

        .steam-btn-large {
            background: linear-gradient(to bottom, #a4ad8d 0%, #6b7754 100%);
            border: 1px solid #000;
            padding: 10px 40px;
            font-size: 18px;
            font-weight: 900;
            font-style: italic;
        }

        h1 { color: #fff; text-shadow: 1px 1px 0px #000; }

        /* TAB STYLE */
        .steam-tab {
            padding: 5px 15px;
            background: var(--steam-panel);
            border: 1px solid var(--steam-border-dark);
            border-bottom: none;
            display: inline-block;
            margin-right: 2px;
            color: var(--steam-yellow);
        }
    </style>
</head>
<body class="p-4">

    <nav class="flex justify-between items-center mb-4 pb-2 border-b border-white/10">
        <a href="../" class="font-bold text-white tracking-tight text-lg">
            JAYRAFFE COMPLEX <span class="text-xs opacity-50 font-normal">v1.1.0 (Moose Jayraffe)</span>
        </a>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <span id="user-name" class="font-bold text-white">Guest User</span>
                <p id="user-rank" class="text-[9px] uppercase opacity-50">Not Connected</p>
            </div>
            <div id="user-avatar" class="w-8 h-8 steam-inset flex items-center justify-center">👤</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        
        <div class="steam-window mb-6">
            <div class="bg-[#323933] p-1 mb-1 text-[10px] font-bold uppercase px-2 text-slate-400">
                Live Interface Uplink // <span id="activity-tags">LOADING...</span>
            </div>
            <div class="relative bg-black aspect-video w-full steam-inset overflow-hidden">
                <div id="activity-container" class="w-full h-full flex items-center justify-center">
                    <div id="loading-ui" class="text-center">
                        <button id="start-btn" class="steam-btn steam-btn-large">
                            LAUNCH ACTIVITY
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            
            <div class="lg:col-span-2">
                <div class="steam-tab uppercase font-bold">Details</div>
                <div class="steam-window p-6 min-h-[200px]">
                    <h1 id="activity-title" class="text-4xl font-black italic uppercase mb-1">ACTIVITY TITLE</h1>
                    <p id="activity-creator" class="text-yellow-600 font-bold mb-4">DEV: UNKNOWN</p>
                    
                    <div class="h-px w-full bg-black/20 mb-4"></div>
                    
                    <p id="activity-desc" class="text-sm leading-relaxed text-slate-300">
                        Fetching sector data...
                    </p>

                    <div id="server-preview" class="hidden mt-6 p-3 steam-inset bg-[#2a322c]">
                        <p class="text-[10px] font-bold text-emerald-500 uppercase">Multiplayer detected: 12 Players Online</p>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="steam-tab uppercase font-bold">Preview</div>
                <div class="steam-window p-2">
                    <div class="steam-inset">
                        <img id="random-screenshot" src="" class="w-full h-auto grayscale-[0.5] hover:grayscale-0 transition duration-500">
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button id="fav-btn" onclick="toggleFavorite()" class="steam-btn flex-1 flex items-center justify-center gap-2">
                        <span id="fav-text">FAVORITE</span>
                    </button>
                    <button class="steam-btn flex-1">SHARE</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        let data = null;
        const params = new URLSearchParams(window.location.search);
        const activityId = params.get('id') || 'hl1';

        function initPage() {
            const library = window.activityLibrary;
            if (!library) return;
            data = library[activityId];

            if (data) {
                document.title = `Steam | ${data.title}`;
                document.getElementById('activity-title').innerText = data.title;
                document.getElementById('activity-creator').innerText = `DEVELOPER: ${data.creator.toUpperCase()}`;
                document.getElementById('activity-desc').innerText = data.desc;
                document.getElementById('activity-tags').innerText = data.tags;
                document.getElementById('random-screenshot').src = `../${data.screenshots[0]}`;
                
                if (data.engine === 'xash3d') {
                    document.getElementById('server-preview').classList.remove('hidden');
                }
            }
        }

        document.getElementById('start-btn').addEventListener('click', function () {
            const container = document.getElementById('activity-container');
            container.innerHTML = ''; 

            setInterval(() => { updatePresence(data.title); }, 30000);

            if (data.engine === 'Flash') {
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                player.className = "w-full h-full";
                container.appendChild(player);
                player.load(`../assets/swfs/${data.config.filename}.swf`);
            } else if (data.engine === "JS-DOS") {
                container.innerHTML = '<div id="dos" class="w-full h-full"></div>';
                Dos(document.getElementById("dos"),{ url: (data.config.url), key: ("zgwvz"), kiosk: (true), autoStart: (true)});
            } else {
                const activityFrame = document.createElement('iframe');
                activityFrame.src = data.config.url;
                activityFrame.className = "w-full h-full border-0";
                activityFrame.allow = "autoplay; fullscreen; keyboard; activitypad; pointer-lock";
                container.appendChild(activityFrame);
            }
        });

        async function updatePresence(gameTitle) {
            const client = window.supabaseClient;
            if(!client) return;
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                await client.from('presence').upsert({ 
                    user_id: user.id, 
                    last_seen: new Date().toISOString(),
                    current_activity: gameTitle 
                });
            }
        }

        async function syncUserStatus() {
            const client = window.supabaseClient;
            if(!client) return;
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                document.getElementById('user-name').innerText = user.user_metadata?.display_name || user.email.split('@')[0];
                document.getElementById('user-rank').innerText = "Verified Citizen";
                if (user.user_metadata?.avatar_url) {
                    document.getElementById('user-avatar').innerHTML = `<img src="${user.user_metadata.avatar_url}" class="w-full h-full object-cover">`;
                }
                updatePresence(data.title); 
            }
        }

        window.addEventListener('load', () => {
            initPage();
            syncUserStatus();
        });
    </script>
</body>
</html>
