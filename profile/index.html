<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayraffe Complex | User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global.js"></script>
    <style>
        :root {
            --steam-bg: #3d463f;
            --steam-panel: #4b564d;
            --steam-border-light: #5d6a60;
            --steam-border-dark: #2a322c;
            --steam-input: #2a322c;
            --steam-text: #d1d1d1;
            --steam-yellow: #c1c6ad;
        }

        body { 
            background-color: var(--steam-bg); 
            color: var(--steam-text);
            font-family: "Tahoma", "Verdana", sans-serif; 
            font-size: 11px;
        }

        /* Standard Steam-style Window */
        .steam-window {
            background: var(--steam-panel);
            border: 1px solid var(--steam-border-dark);
            border-top: 1px solid var(--steam-border-light);
            border-left: 1px solid var(--steam-border-light);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* Inset area for content */
        .steam-inset {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--steam-border-dark);
            border-right: 1px solid var(--steam-border-light);
            border-bottom: 1px solid var(--steam-border-light);
        }

        .steam-btn {
            background: linear-gradient(to bottom, #5a665b 0%, #3d463f 100%);
            border: 1px solid var(--steam-border-dark);
            border-top: 1px solid var(--steam-border-light);
            border-left: 1px solid var(--steam-border-light);
            color: #fff;
            padding: 3px 12px;
            font-size: 10px;
            cursor: pointer;
        }

        .steam-btn:active {
            border: 1px solid var(--steam-border-light);
            border-top: 1px solid var(--steam-border-dark);
            border-left: 1px solid var(--steam-border-dark);
            background: #2a322c;
        }

        .label-yellow { color: var(--steam-yellow); font-weight: bold; text-transform: uppercase; font-size: 10px; }

        /* Game List Style */
        .game-row {
            border-bottom: 1px solid rgba(0,0,0,0.2);
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .game-row:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4">

    <nav class="steam-window mb-6 p-2 flex justify-between items-center">
        <a href="../homepage" class="font-bold text-white px-2">JAYRAFFE COMPLEX</a>
        <div class="text-[9px] opacity-60 px-2 uppercase">Profile Viewer v1.0</div>
    </nav>

   <main class="max-w-5xl mx-auto">
        <div class="steam-window p-6 mb-8 flex flex-col md:flex-row gap-8 items-start">
            
            <div id="profile-avatar" class="w-32 h-32 steam-inset flex-shrink-0 flex items-center justify-center text-4xl overflow-hidden">
                👤
            </div>

            <div class="flex-grow space-y-4">
                <div>
                    <h1 id="profile-name" class="text-2xl font-bold text-white leading-none">Loading...</h1>
                    <p id="profile-email" class="text-[10px] opacity-50 font-mono mt-1">Unauthorized</p>
                </div>

                <div class="steam-inset p-3 bg-[#323933]">
                    <div class="flex justify-between items-center mb-1">
                        <span class="label-yellow">Status / Bio</span>
                        <button onclick="updateBio()" id="edit-btn" class="steam-btn hidden">Edit</button>
                    </div>
                    <p id="display-bio" class="italic text-white/80">"Fetching status..."</p>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <p class="label-yellow">Rank</p>
                        <p class="text-white font-bold">Citizen</p>
                    </div>
                    <div>
                        <p class="label-yellow">Status</p>
                        <p class="text-white font-bold">Active</p>
                    </div>
                    <button id="signout-btn" onclick="handleSignOut()" class="steam-btn self-end hidden">Sign Out</button>
                </div>
            </div>
        </div>

        <div class="steam-window">
            <div class="bg-[#323933] p-2 border-b border-black/40">
                <span class="label-yellow">Favorite Activities</span>
            </div>
            
            <div id="favorites-grid" class="steam-inset min-h-[200px]">
                <div class="p-10 text-center opacity-30 italic">Accessing archives...</div>
            </div>
        </div>
    </main>
    
    <script>
        async function loadProfile() {
            const client = window.supabaseClient;
            if (!client) { setTimeout(loadProfile, 100); return; }

            const params = new URLSearchParams(window.location.search);
            const urlId = params.get('id');
            const { data: { user: viewer } } = await client.auth.getUser();
            const targetUserId = urlId || (viewer ? viewer.id : null);

            if (!targetUserId) { window.location.href = "../auth/"; return; }

            const isOwner = viewer && viewer.id === targetUserId;

            // Toggle visibility for owner actions
            if (isOwner) {
                document.getElementById('edit-btn').classList.remove('hidden');
                document.getElementById('signout-btn').classList.remove('hidden');
            }

            const { data: profile, error } = await client
                .from('profiles')
                .select('favorites, bio, display_name, avatar_url') 
                .eq('id', targetUserId)
                .single();

            if (error || !profile) {
                document.getElementById('profile-name').innerText = "ARCHIVE NOT FOUND";
                return;
            }

            document.getElementById('profile-name').innerText = profile.display_name || "New Citizen";
            document.getElementById('display-bio').innerText = profile.bio ? `"${profile.bio}"` : "No status set.";
            
            if (isOwner) document.getElementById('profile-email').innerText = viewer.email;
            else document.getElementById('profile-email').innerText = "CITIZEN VERIFIED";

            if (profile.avatar_url) {
                document.getElementById('profile-avatar').innerHTML = `<img src="${profile.avatar_url}" class="w-full h-full object-cover">`;
            }

            // Load Favorites as a List
            const favIds = profile?.favorites || [];
            const grid = document.getElementById('favorites-grid');
            grid.innerHTML = ''; 

            if (favIds.length === 0) {
                grid.innerHTML = `<div class="p-10 text-center opacity-40">No activities saved to this profile.</div>`;
            } else {
                favIds.forEach(id => {
                    const game = window.activityLibrary[id];
                    if (game) {
                        const row = document.createElement('div');
                        row.className = "game-row";
                        row.innerHTML = `
                            <img src="../${game.banner}" class="w-20 h-12 object-cover steam-inset">
                            <div class="flex-grow">
                                <div class="text-white font-bold uppercase">${game.title}</div>
                                <div class="text-[9px] opacity-50">${game.tags}</div>
                            </div>
                            <a href="../experience/?id=${id}" class="steam-btn">Launch</a>
                        `;
                        grid.appendChild(row);
                    }
                });
            }
        }

        async function updateBio() {
            const currentBio = document.getElementById('display-bio').innerText.replace(/"/g, "");
            const newBio = prompt("Update Status:", currentBio);
            if (newBio !== null) {
                const client = window.supabaseClient;
                const { data: { user } } = await client.auth.getUser();
                const { error } = await client.from('profiles').update({ bio: newBio }).eq('id', user.id);
                if (error) alert("Update Failed");
                else document.getElementById('display-bio').innerText = `"${newBio}"`;
            }
        }

        async function handleSignOut() {
            await window.supabaseClient.auth.signOut();
            window.location.href = "../auth/";
        }

        window.addEventListener('load', loadProfile);
    </script>
</body>
</html>
