<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayraffe Complex | Server Uplink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../global.js"></script>
    <link rel="stylesheet" href="../style.css"> </head>
<body class="p-6 bg-[#3d463f]">

    <nav class="steam-window mb-4 p-2 flex justify-between items-center text-white">
        <div class="flex gap-4 items-center">
            <a href="../homepage" class="font-bold">JAYRAFFE COMPLEX</a>
            <span class="opacity-30">|</span>
            <div class="flex gap-3 uppercase text-[9px] font-bold">
                <a href="../board/">Message Board</a>
                <a href="../search/">Citizens</a>
                <a href="../servers/" class="text-steam-yellow">Server Uplink</a>
            </div>
        </div>
        <div class="flex gap-4 items-center px-2">
            <a href="../settings/" class="text-[10px] uppercase font-bold opacity-60 hover:opacity-100">Settings</a>
            <div id="nav-user-display" class="text-[10px] uppercase font-bold text-steam-yellow"></div>
        </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="steam-window p-4 h-fit">
            <div class="label-yellow uppercase font-bold text-[10px] mb-4">Broadcast New Uplink</div>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] uppercase opacity-60 block mb-1">Target Engine</label>
                    <select id="game-select" class="steam-input">
                        <option>Garry's Mod 10</option>
                        <option>Team Fortress 2</option>
                        <option>Xash3D (HL1)</option>
                        <option>Counter-Strike 1.6</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] uppercase opacity-60 block mb-1">Host/Server Name</label>
                    <input type="text" id="server-name" class="steam-input" placeholder="e.g. School Construct">
                </div>
                <div>
                    <label class="text-[9px] uppercase opacity-60 block mb-1">Tunnel Address (ZeroTier/Playit)</label>
                    <input type="text" id="server-ip" class="steam-input" placeholder="10.x.x.x:27015">
                </div>
                <button onclick="broadcastServer()" class="steam-btn w-full py-2 font-bold">INITIALIZE BROADCAST</button>
            </div>
            
            <div class="mt-6 p-2 bg-black/20 border border-white/5 text-[9px] opacity-50 italic">
                Note: Uplinks will automatically expire after 2 hours of inactivity.
            </div>
        </div>

        <div class="lg:col-span-3 steam-window min-h-[500px] flex flex-col">
            <div class="bg-black/20 p-2 border-b border-black/40 flex justify-between items-center">
                <span class="label-yellow uppercase font-bold text-[10px]">Active Network Uplinks</span>
                <button onclick="loadServers()" class="text-[9px] opacity-60 hover:opacity-100 underline uppercase">Refresh List</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px] border-collapse">
                    <thead class="bg-[#4b564d] text-white/50 uppercase text-[9px] sticky top-0">
                        <tr>
                            <th class="p-2 border-r border-black/20">Game</th>
                            <th class="p-2 border-r border-black/20">Server Name</th>
                            <th class="p-2 border-r border-black/20">Host</th>
                            <th class="p-2 border-r border-black/20">Address</th>
                            <th class="p-2">Action</th>
                        </tr>
                    </thead>
                    <tbody id="server-list" class="text-white">
                        </tbody>
                </table>
            </div>
            <div id="empty-state" class="flex-grow flex items-center justify-center opacity-20 hidden">
                <div class="text-center italic">No active broadcasts detected in the Complex...</div>
            </div>
        </div>
    </div>

    <script>
        const client = window.supabaseClient;

        async function loadServers() {
            const { data: servers, error } = await client
                .from('game_servers')
                .select(`*, profiles(display_name)`)
                .gt('created_at', new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString()) // Only last 2 hours
                .order('created_at', { ascending: false });

            const list = document.getElementById('server-list');
            const empty = document.getElementById('empty-state');
            
            list.innerHTML = '';
            if (!servers || servers.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            servers.forEach(srv => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-white/5 hover:bg-white/5 group";
                tr.innerHTML = `
                    <td class="p-2 opacity-70">${srv.game_name}</td>
                    <td class="p-2 font-bold text-steam-yellow">${srv.server_name}</td>
                    <td class="p-2 opacity-70">${srv.profiles.display_name}</td>
                    <td class="p-2"><code class="bg-black/40 px-1 rounded text-[10px] font-mono">${srv.ip_address}</code></td>
                    <td class="p-2">
                        <button onclick="copyConnect('${srv.ip_address}')" class="steam-btn !py-0 !px-2 text-[9px]">COPY CONNECT</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        async function broadcastServer() {
            const { data: { user } } = await client.auth.getUser();
            const payload = {
                host_id: user.id,
                game_name: document.getElementById('game-select').value,
                server_name: document.getElementById('server-name').value,
                ip_address: document.getElementById('server-ip').value
            };

            const { error } = await client.from('game_servers').insert(payload);
            if (error) alert("Broadcast failed: " + error.message);
            else {
                loadServers();
                // Clear inputs
                document.getElementById('server-name').value = '';
                document.getElementById('server-ip').value = '';
            }
        }

        function copyConnect(ip) {
            const cmd = `connect ${ip}`;
            navigator.clipboard.writeText(cmd);
            alert("Copied to clipboard!\nOpen your game console (~) and paste to join.");
        }

        // Initialize
        window.addEventListener('load', () => {
            loadServers();
            // Optional: Set up real-time subscription
            client.channel('any').on('postgres_changes', { event: '*', table: 'game_servers' }, loadServers).subscribe();
        });
    </script>
</body>
</html>
